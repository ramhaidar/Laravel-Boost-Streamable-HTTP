name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }} / Boost ${{ matrix.boost }} / MCP ${{ matrix.mcp }}

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
        laravel: ['11.*', '12.*']
        boost: ['^2.0']
        mcp: ['^0.7.0']
        include:
          - laravel: '11.*'
            testbench: '^9.5'
          - laravel: '12.*'
            testbench: '^10.0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl, json, openssl, dom, fileinfo
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache/files
          key: deps-${{ runner.os }}-php${{ matrix.php }}-l${{ matrix.laravel }}-boost${{ matrix.boost }}-mcp${{ matrix.mcp }}-${{ hashFiles('**/composer.json') }}

      - name: Pin Laravel and MCP versions
        run: |
          composer require --no-update --no-interaction \
            "illuminate/contracts:${{ matrix.laravel }}" \
            "illuminate/routing:${{ matrix.laravel }}" \
            "illuminate/support:${{ matrix.laravel }}" \
            "laravel/boost:${{ matrix.boost }}" \
            "laravel/mcp:${{ matrix.mcp }}"
          composer require --dev --no-update --no-interaction \
            "orchestra/testbench:${{ matrix.testbench }}"

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: vendor/bin/phpunit

      - name: Upload phpunit logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: phpunit-php${{ matrix.php }}-l${{ matrix.laravel }}
          path: |
            .phpunit.cache

  prefer-lowest:
    runs-on: ubuntu-latest
    name: Prefer-lowest (PHP 8.2 / L11 floor)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, intl, json, openssl, dom, fileinfo
          coverage: none
          tools: composer:v2

      - name: Pin floor
        run: |
          composer require --no-update --no-interaction \
            "illuminate/contracts:^11.0" \
            "illuminate/routing:^11.0" \
            "illuminate/support:^11.0" \
            "laravel/mcp:^0.7.0" \
            "laravel/boost:^2.0"
          composer require --dev --no-update --no-interaction \
            "orchestra/testbench:^9.5"

      - name: Install dependencies (prefer-lowest)
        run: composer update --prefer-lowest --prefer-stable --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: vendor/bin/phpunit

      - name: Upload phpunit logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: phpunit-prefer-lowest
          path: |
            .phpunit.cache

  pint:
    runs-on: ubuntu-latest
    name: Pint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, json, openssl, dom, fileinfo
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run Pint
        run: vendor/bin/pint --test

  static-analysis:
    runs-on: ubuntu-latest
    name: Larastan

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, json, openssl, dom, fileinfo
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run Larastan
        run: vendor/bin/phpstan analyse --memory-limit=-1 --no-progress
